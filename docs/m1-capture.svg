<svg xmlns="http://www.w3.org/2000/svg" width="880" height="384" viewBox="0 0 880 384" role="img" aria-label="Packet capture from MORT OS M1: a 21-byte Ethernet frame transmitted by the RTL8139 driver. Destination ff:ff:ff:ff:ff:ff broadcast, source 52:54:00:12:34:56 (the card's own MAC, read from its registers), EtherType 0x88B5, payload MORTNET. Verified present in build/capture.pcap.">
  <rect x="0.5" y="0.5" width="879" height="383" rx="12" fill="#0d1117" stroke="#30363d"/>
  <circle cx="26" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="20" r="6" fill="#febc2e"/>
  <circle cx="66" cy="20" r="6" fill="#28c840"/>
  <text x="440" y="24" text-anchor="middle" font-size="12" fill="#8b949e" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">build/capture.pcap — frame #1</text>
  <line x1="1" y1="39.5" x2="879" y2="39.5" stroke="#30363d" stroke-opacity="0.6"/>

  <text x="24" y="66" font-size="13" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace"><tspan fill="#3fb950">$</tspan><tspan fill="#e6edf3"> python demo/build_demo.py capture</tspan></text>
  <text x="24" y="88" font-size="13" fill="#8b949e" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">Booting the demo headless with an RTL8139 + packet dump...</text>
  <text x="24" y="110" font-size="13" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace"><tspan fill="#3fb950" font-weight="700">PASS</tspan><tspan fill="#e6edf3">: 1 frame captured — broadcast MORTNET frame, EtherType 0x88B5</tspan></text>

  <text x="24" y="150" font-size="12" fill="#8b949e" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">// Ethernet II, 21 bytes on the wire — every byte written by glue/rtl8139.mx</text>

  <!-- byte grid: 21 cells -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="13" font-weight="700" text-anchor="middle">
    <!-- dst: ff x6 (red) -->
    <g>
      <rect x="24"  y="166" width="34" height="30" rx="4" fill="rgba(248,81,73,0.15)" stroke="#f85149"/>
      <rect x="60"  y="166" width="34" height="30" rx="4" fill="rgba(248,81,73,0.15)" stroke="#f85149"/>
      <rect x="96"  y="166" width="34" height="30" rx="4" fill="rgba(248,81,73,0.15)" stroke="#f85149"/>
      <rect x="132" y="166" width="34" height="30" rx="4" fill="rgba(248,81,73,0.15)" stroke="#f85149"/>
      <rect x="168" y="166" width="34" height="30" rx="4" fill="rgba(248,81,73,0.15)" stroke="#f85149"/>
      <rect x="204" y="166" width="34" height="30" rx="4" fill="rgba(248,81,73,0.15)" stroke="#f85149"/>
      <text x="41"  y="186" fill="#f85149">ff</text>
      <text x="77"  y="186" fill="#f85149">ff</text>
      <text x="113" y="186" fill="#f85149">ff</text>
      <text x="149" y="186" fill="#f85149">ff</text>
      <text x="185" y="186" fill="#f85149">ff</text>
      <text x="221" y="186" fill="#f85149">ff</text>
    </g>
    <!-- src: 52 54 00 12 34 56 (blue) -->
    <g>
      <rect x="244" y="166" width="34" height="30" rx="4" fill="rgba(88,166,255,0.15)" stroke="#58a6ff"/>
      <rect x="280" y="166" width="34" height="30" rx="4" fill="rgba(88,166,255,0.15)" stroke="#58a6ff"/>
      <rect x="316" y="166" width="34" height="30" rx="4" fill="rgba(88,166,255,0.15)" stroke="#58a6ff"/>
      <rect x="352" y="166" width="34" height="30" rx="4" fill="rgba(88,166,255,0.15)" stroke="#58a6ff"/>
      <rect x="388" y="166" width="34" height="30" rx="4" fill="rgba(88,166,255,0.15)" stroke="#58a6ff"/>
      <rect x="424" y="166" width="34" height="30" rx="4" fill="rgba(88,166,255,0.15)" stroke="#58a6ff"/>
      <text x="261" y="186" fill="#58a6ff">52</text>
      <text x="297" y="186" fill="#58a6ff">54</text>
      <text x="333" y="186" fill="#58a6ff">00</text>
      <text x="369" y="186" fill="#58a6ff">12</text>
      <text x="405" y="186" fill="#58a6ff">34</text>
      <text x="441" y="186" fill="#58a6ff">56</text>
    </g>
    <!-- etype: 88 b5 (green) -->
    <g>
      <rect x="464" y="166" width="34" height="30" rx="4" fill="rgba(63,185,80,0.15)" stroke="#3fb950"/>
      <rect x="500" y="166" width="34" height="30" rx="4" fill="rgba(63,185,80,0.15)" stroke="#3fb950"/>
      <text x="481" y="186" fill="#3fb950">88</text>
      <text x="517" y="186" fill="#3fb950">b5</text>
    </g>
    <!-- payload: 4d 4f 52 54 4e 45 54 (amber) -->
    <g>
      <rect x="540" y="166" width="34" height="30" rx="4" fill="rgba(210,153,34,0.15)" stroke="#d29922"/>
      <rect x="576" y="166" width="34" height="30" rx="4" fill="rgba(210,153,34,0.15)" stroke="#d29922"/>
      <rect x="612" y="166" width="34" height="30" rx="4" fill="rgba(210,153,34,0.15)" stroke="#d29922"/>
      <rect x="648" y="166" width="34" height="30" rx="4" fill="rgba(210,153,34,0.15)" stroke="#d29922"/>
      <rect x="684" y="166" width="34" height="30" rx="4" fill="rgba(210,153,34,0.15)" stroke="#d29922"/>
      <rect x="720" y="166" width="34" height="30" rx="4" fill="rgba(210,153,34,0.15)" stroke="#d29922"/>
      <rect x="756" y="166" width="34" height="30" rx="4" fill="rgba(210,153,34,0.15)" stroke="#d29922"/>
      <text x="557" y="186" fill="#d29922">4d</text>
      <text x="593" y="186" fill="#d29922">4f</text>
      <text x="629" y="186" fill="#d29922">52</text>
      <text x="665" y="186" fill="#d29922">54</text>
      <text x="701" y="186" fill="#d29922">4e</text>
      <text x="737" y="186" fill="#d29922">45</text>
      <text x="773" y="186" fill="#d29922">54</text>
    </g>
    <!-- ascii row under payload -->
    <g font-size="11" font-weight="400">
      <text x="557" y="212" fill="#8b949e">M</text>
      <text x="593" y="212" fill="#8b949e">O</text>
      <text x="629" y="212" fill="#8b949e">R</text>
      <text x="665" y="212" fill="#8b949e">T</text>
      <text x="701" y="212" fill="#8b949e">N</text>
      <text x="737" y="212" fill="#8b949e">E</text>
      <text x="773" y="212" fill="#8b949e">T</text>
    </g>
  </g>

  <!-- field legend -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="13">
    <rect x="24" y="250" width="12" height="12" rx="2" fill="rgba(248,81,73,0.2)" stroke="#f85149"/>
    <text x="44" y="260" fill="#c9d1d9">Destination &#8212; ff:ff:ff:ff:ff:ff (broadcast)</text>

    <rect x="24" y="276" width="12" height="12" rx="2" fill="rgba(88,166,255,0.2)" stroke="#58a6ff"/>
    <text x="44" y="286" fill="#c9d1d9">Source &#8212; 52:54:00:12:34:56 &#183; <tspan fill="#8b949e">read from the card's own registers by rtl_mac()</tspan></text>

    <rect x="24" y="302" width="12" height="12" rx="2" fill="rgba(63,185,80,0.2)" stroke="#3fb950"/>
    <text x="44" y="312" fill="#c9d1d9">EtherType &#8212; 0x88B5 (IEEE experimental)</text>

    <rect x="24" y="328" width="12" height="12" rx="2" fill="rgba(210,153,34,0.2)" stroke="#d29922"/>
    <text x="44" y="338" fill="#c9d1d9">Payload &#8212; "MORTNET"</text>
  </g>

  <text x="856" y="366" text-anchor="end" font-size="12" fill="#8b949e" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">MORT OS &#8594; RTL8139 &#8594; the wire. M1 complete.</text>
</svg>
