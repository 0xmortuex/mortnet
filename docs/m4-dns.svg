<svg xmlns="http://www.w3.org/2000/svg" width="880" height="424" viewBox="0 0 880 424" role="img" aria-label="A captured DNS resolution: MORT OS finds the DNS server 10.0.2.3 by ARP, sends an A-record query for example.com, and receives an answer which it parses to a real IPv4 address. All four frames are real, captured from build/capture.pcap.">
  <rect x="0.5" y="0.5" width="879" height="423" rx="12" fill="#0d1117" stroke="#30363d"/>
  <circle cx="26" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="20" r="6" fill="#febc2e"/>
  <circle cx="66" cy="20" r="6" fill="#28c840"/>
  <text x="440" y="24" text-anchor="middle" font-size="12" fill="#8b949e" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">build/capture.pcap — resolve example.com</text>
  <line x1="1" y1="39.5" x2="879" y2="39.5" stroke="#30363d" stroke-opacity="0.6"/>

  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" text-anchor="middle">
    <rect x="70" y="58" width="230" height="46" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.4"/>
    <text x="185" y="80" font-size="14" font-weight="700" fill="#3fb950">MORT OS</text>
    <text x="185" y="97" font-size="11" fill="#8b949e">10.0.2.15</text>

    <rect x="580" y="58" width="230" height="46" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
    <text x="695" y="80" font-size="14" font-weight="700" fill="#58a6ff">DNS server</text>
    <text x="695" y="97" font-size="11" fill="#8b949e">10.0.2.3 → the real internet</text>
  </g>

  <line x1="185" y1="104" x2="185" y2="340" stroke="#30363d" stroke-width="1.5"/>
  <line x1="695" y1="104" x2="695" y2="340" stroke="#30363d" stroke-width="1.5"/>

  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="12.5">
    <!-- 1 ARP -->
    <line x1="185" y1="148" x2="689" y2="148" stroke="#d29922" stroke-width="2"/>
    <polygon points="689,144 697,148 689,152" fill="#d29922"/>
    <text x="440" y="141" text-anchor="middle" fill="#d29922" font-weight="700">ARP · who has 10.0.2.3?</text>
    <text x="440" y="162" text-anchor="middle" fill="#6e7681" font-size="10.5">find the resolver's MAC first</text>

    <!-- 2 ARP reply -->
    <line x1="695" y1="200" x2="191" y2="200" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="191,196 183,200 191,204" fill="#58a6ff"/>
    <text x="440" y="193" text-anchor="middle" fill="#58a6ff" font-weight="700">ARP · 10.0.2.3 is at 52:55:0a:00:02:03</text>

    <!-- 3 DNS query -->
    <line x1="185" y1="252" x2="689" y2="252" stroke="#3fb950" stroke-width="2"/>
    <polygon points="689,248 697,252 689,256" fill="#3fb950"/>
    <text x="440" y="245" text-anchor="middle" fill="#3fb950" font-weight="700">DNS query · A? example.com</text>
    <text x="440" y="266" text-anchor="middle" fill="#6e7681" font-size="10.5">UDP 49152 → 53 · QNAME 7"example" 3"com" 0</text>

    <!-- 4 DNS answer -->
    <line x1="695" y1="304" x2="191" y2="304" stroke="#58a6ff" stroke-width="2"/>
    <polygon points="191,300 183,304 191,308" fill="#58a6ff"/>
    <text x="440" y="297" text-anchor="middle" fill="#58a6ff" font-weight="700">DNS answer · A record</text>
    <text x="440" y="318" text-anchor="middle" fill="#6e7681" font-size="10.5">MORT OS skips the compressed name and reads the 4-byte address</text>
  </g>

  <line x1="24" y1="360" x2="856" y2="360" stroke="#30363d" stroke-opacity="0.5"/>
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">
    <text x="24" y="384" font-size="12.5"><tspan fill="#3fb950" font-weight="700">PASS</tspan><tspan fill="#c9d1d9"> — MORT OS resolved a hostname over real DNS. UDP + DNS written from scratch in Mort.</tspan></text>
    <text x="24" y="410" font-size="13"><tspan fill="#8b949e">mortnet M4: DNS</tspan></text>
    <rect x="140" y="397" width="260" height="20" rx="4" fill="#161b22" stroke="#3fb950"/>
    <text x="152" y="411" font-size="12.5" font-weight="700" fill="#3fb950">example.com = 104.20.23.154</text>
    <text x="410" y="411" font-size="10.5" fill="#6e7681">(whatever real DNS returns)</text>
    <text x="856" y="410" text-anchor="end" font-size="11.5" fill="#8b949e">M4 complete.</text>
  </g>
</svg>
