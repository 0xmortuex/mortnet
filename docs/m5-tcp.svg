<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" role="img" aria-label="A captured TCP connection from MORT OS to a host server: three-way handshake (SYN, SYN-ACK, ACK), data exchange (MORT OS sends mortnet, the server replies HELLO-MORTNET), and a clean four-way close (FIN/ACK both directions). Sequence and acknowledgement numbers track correctly throughout. All frames real, from build/capture.pcap.">
  <rect x="0.5" y="0.5" width="879" height="559" rx="12" fill="#0d1117" stroke="#30363d"/>
  <circle cx="26" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="20" r="6" fill="#febc2e"/>
  <circle cx="66" cy="20" r="6" fill="#28c840"/>
  <text x="440" y="24" text-anchor="middle" font-size="12" fill="#8b949e" font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">build/capture.pcap — a TCP connection, open to close</text>
  <line x1="1" y1="39.5" x2="879" y2="39.5" stroke="#30363d" stroke-opacity="0.6"/>

  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" text-anchor="middle">
    <rect x="70" y="54" width="230" height="42" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.4"/>
    <text x="185" y="72" font-size="14" font-weight="700" fill="#3fb950">MORT OS</text>
    <text x="185" y="88" font-size="11" fill="#8b949e">10.0.2.15:40001</text>
    <rect x="580" y="54" width="230" height="42" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.4"/>
    <text x="695" y="72" font-size="14" font-weight="700" fill="#58a6ff">host server</text>
    <text x="695" y="88" font-size="11" fill="#8b949e">10.0.2.2:8888</text>
  </g>
  <line x1="185" y1="96" x2="185" y2="474" stroke="#30363d" stroke-width="1.5"/>
  <line x1="695" y1="96" x2="695" y2="474" stroke="#30363d" stroke-width="1.5"/>

  <!-- phase labels -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="10.5" fill="#6e7681" text-anchor="start">
    <text x="24" y="128">HANDSHAKE</text>
    <text x="24" y="250">DATA</text>
    <text x="24" y="372">CLOSE</text>
  </g>

  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace" font-size="12" text-anchor="middle">
    <!-- handshake -->
    <line x1="185" y1="128" x2="689" y2="128" stroke="#d29922" stroke-width="2"/><polygon points="689,124 697,128 689,132" fill="#d29922"/>
    <text x="440" y="122" fill="#d29922" font-weight="700">SYN · seq=0</text>
    <line x1="695" y1="160" x2="191" y2="160" stroke="#58a6ff" stroke-width="2"/><polygon points="191,156 183,160 191,164" fill="#58a6ff"/>
    <text x="440" y="154" fill="#58a6ff" font-weight="700">SYN, ACK · seq=0 ack=1</text>
    <line x1="185" y1="192" x2="689" y2="192" stroke="#3fb950" stroke-width="2"/><polygon points="689,188 697,192 689,196" fill="#3fb950"/>
    <text x="440" y="186" fill="#3fb950" font-weight="700">ACK · ack=1 — established</text>

    <!-- data -->
    <line x1="185" y1="250" x2="689" y2="250" stroke="#3fb950" stroke-width="2"/><polygon points="689,246 697,250 689,254" fill="#3fb950"/>
    <text x="440" y="244" fill="#3fb950" font-weight="700">PSH, ACK · "mortnet\n" (8 bytes)</text>
    <line x1="695" y1="290" x2="191" y2="290" stroke="#58a6ff" stroke-width="2"/><polygon points="191,286 183,290 191,294" fill="#58a6ff"/>
    <text x="440" y="278" fill="#58a6ff" font-weight="700">ACK ack=9, then PSH · "HELLO-MORTNET\n"</text>
    <text x="440" y="306" fill="#6e7681" font-size="10.5">MORT OS ACKs the 14 received bytes</text>

    <!-- close -->
    <line x1="695" y1="372" x2="191" y2="372" stroke="#58a6ff" stroke-width="2"/><polygon points="191,368 183,372 191,376" fill="#58a6ff"/>
    <text x="440" y="366" fill="#58a6ff" font-weight="700">FIN, ACK · server closes</text>
    <line x1="185" y1="404" x2="689" y2="404" stroke="#3fb950" stroke-width="2"/><polygon points="689,400 697,404 689,408" fill="#3fb950"/>
    <text x="440" y="398" fill="#3fb950" font-weight="700">ACK the FIN</text>
    <line x1="185" y1="436" x2="689" y2="436" stroke="#3fb950" stroke-width="2"/><polygon points="689,432 697,436 689,440" fill="#3fb950"/>
    <text x="440" y="430" fill="#3fb950" font-weight="700">FIN, ACK · MORT OS closes</text>
    <line x1="695" y1="464" x2="191" y2="464" stroke="#58a6ff" stroke-width="2"/><polygon points="191,460 183,464 191,468" fill="#58a6ff"/>
    <text x="440" y="458" fill="#58a6ff" font-weight="700">ACK — closed</text>
  </g>

  <line x1="24" y1="494" x2="856" y2="494" stroke="#30363d" stroke-opacity="0.5"/>
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,monospace">
    <text x="24" y="518" font-size="12.5"><tspan fill="#3fb950" font-weight="700">PASS</tspan><tspan fill="#c9d1d9"> — a full TCP connection driven by a stack written in Mort. The host server received exactly "mortnet\n".</tspan></text>
    <text x="24" y="542" font-size="12"><tspan fill="#8b949e">seq/ack tracked across the handshake, 8 bytes out, 14 bytes in, and a four-way close.</tspan></text>
    <text x="856" y="542" text-anchor="end" font-size="11.5" fill="#8b949e">M5 complete.</text>
  </g>
</svg>
